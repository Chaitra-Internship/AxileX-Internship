<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
</head>
<body>

<h2>Edit Product</h2>

<form method="POST">
    Name: <input type="text" name="name" value="{{ product[1] }}" required><br><br>
    Price: <input type="number" name="price" value="{{ product[2] }}" required><br><br>
    Quantity: <input type="number" name="quantity" value="{{ product[3] }}" required><br><br>

    <button type="submit">Update</button>
</form>

<a href="/">Back</a>

</body>
</html>
