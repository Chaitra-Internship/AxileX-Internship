<!DOCTYPE html>
<html>
<head>
    <title>Product CRUD</title>
</head>
<body>

<h2>Product List</h2>

<a href="/add">Add Product</a><br><br>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Price</th>
    <th>Quantity</th>
    <th>Actions</th>
</tr>

{% for p in products %}
<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
    <td>{{ p[2] }}</td>
    <td>{{ p[3] }}</td>
    <td>
        <a href="/edit/{{ p[0] }}">Edit</a>
        <a href="/delete/{{ p[0] }}">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
