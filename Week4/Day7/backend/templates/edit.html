<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
</head>
<body>

<h2>Edit Student</h2>

<form method="POST">
    <label>Name:</label>
    <input type="text" name="name" value="{{ student[1] }}" required><br><br>

    <label>Course:</label>
    <input type="text" name="course" value="{{ student[2] }}" required><br><br>

    <label>Marks:</label>
    <input type="number" name="marks" value="{{ student[3] }}" required><br><br>

    <button type="submit">Update</button>
</form>

<br>
<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
