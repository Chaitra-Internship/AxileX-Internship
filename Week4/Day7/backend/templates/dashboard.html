<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Student Dashboard</h2>

<a href="/add">Add Student</a> |
<a href="/logout">Logout</a>

<br><br>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Course</th>
    <th>Marks</th>
    <th>Actions</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>
    <td>
        <a href="/edit/{{ student[0] }}">Edit</a> |
        <a href="/delete/{{ student[0] }}">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
